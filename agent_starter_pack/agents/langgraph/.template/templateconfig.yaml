display_name: "custom_a2a"
description: "Bring your own framework, A2A-ready"
settings:
  requires_data_ingestion: false
  deployment_targets: ["agent_engine", "cloud_run", "gke", "none"]
  extra_dependencies: [
    "langchain-google-genai>=4.0.0",
    "langchain~=1.0.7",
    "langgraph~=1.0.3",
    "langgraph-prebuilt<1.0.9",
    "langchain-community~=0.4.1",
    "a2a-sdk[http-server]~=0.3.12",
    "nest-asyncio>=1.6.0,<2.0.0",
    "traceloop-sdk>=0.10.0,<1.0.0",
    "opentelemetry-exporter-gcp-trace>=1.9.0,<2.0.0",
    "opentelemetry-exporter-gcp-logging>=1.11.0a0,<2.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
  ]
  tags: ["langgraph", "a2a"]
  frontend_type: "inspector"
example_question: "What's the weather in San Francisco?"